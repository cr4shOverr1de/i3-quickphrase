# i3-quickphrase bindings
# Managed by https://github.com/cr4shOverr1de/i3-quickphrase
#
# This file is included from your main i3 config via the BEGIN/END
# block that install.sh appended to ~/.config/i3/config.
#
# To add a new phrase:
#   1. printf 'Your phrase ' > ~/projects/i3-quickphrase/phrases/yourname.txt
#   2. Add a bindsym line below pointing at the new phrase name
#   3. i3-msg reload
#
# Note: --release ensures the bind fires AFTER the user releases the key,
# avoiding the i3+xdotool mod-key race documented at i3 FAQ #478.

bindsym --release $mod+m exec --no-startup-id /home/cr4sh/.local/bin/i3-quickphrase comprehensive
bindsym --release $mod+period exec --no-startup-id /home/cr4sh/.local/bin/i3-quickphrase clarify
